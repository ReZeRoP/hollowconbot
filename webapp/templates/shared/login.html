<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ورود — BananaBot Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span>🍌</span>
        <h1>BananaBot Panel</h1>
        <p>با حساب تلگرام خود وارد شوید</p>
      </div>

      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-error">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      {% if bot_token_set %}
        <div class="tg-login-wrap">
          <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="{{ bot_username }}"
            data-size="large"
            data-auth-url="{{ request.build_absolute_uri }}"
            data-request-access="write">
          </script>
        </div>
        <p class="login-hint">
          <i class="fa fa-info-circle"></i>
          با کلیک روی دکمه «Log in with Telegram» وارد شوید.
        </p>
      {% else %}
        <div class="alert alert-error">
          <i class="fa fa-triangle-exclamation"></i>
          BOT_TOKEN تنظیم نشده. لطفاً وب‌اپ را پیکربندی کنید.
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
